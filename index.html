<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>filechat — talk to your files</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #11161d;
    --line: #1f2630;
    --ink: #c9d4e0;
    --dim: #6b7785;
    --accent: #7ee787;
    --accent-dim: #3f8a4a;
    --user: #79c0ff;
    --warn: #ffa657;
    --err: #ff7b72;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.55;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--line);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .brand { color: var(--accent); font-weight: 600; letter-spacing: .5px; }
  .brand::before { content: "▍"; color: var(--accent-dim); margin-right: 4px; }
  .stat { color: var(--dim); font-size: 12px; }
  .grow { flex: 1; }
  header button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
  }
  header button:hover { border-color: var(--accent-dim); color: var(--ink); }
  header button:focus-visible { outline: 2px solid var(--user); outline-offset: 1px; }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .row { margin: 0 0 10px; }
  .prompt { color: var(--accent); }
  .you { color: var(--user); }
  .you::before { content: "you › "; color: var(--accent); }
  .sys { color: var(--dim); }
  .err { color: var(--err); }
  .warn { color: var(--warn); }
  .ai { color: var(--ink); }
  .ai::before { content: "agent › "; color: var(--accent); }

  /* rendered markdown */
  .md { white-space: normal; }
  .md.ai::before { display: block; margin-bottom: 4px; }
  .md .md-p { margin: 0 0 8px; white-space: pre-wrap; }
  .md .md-p:last-child { margin-bottom: 0; }
  .md .md-h { color: var(--user); margin: 12px 0 6px; line-height: 1.3; }
  .md h1.md-h { font-size: 1.35em; } .md h2.md-h { font-size: 1.2em; }
  .md h3.md-h { font-size: 1.08em; } .md h4.md-h, .md h5.md-h, .md h6.md-h { font-size: 1em; }
  .md .md-list { margin: 0 0 8px; padding-left: 22px; }
  .md .md-list li { margin: 2px 0; }
  .md strong { color: #e6edf3; font-weight: 600; }
  .md em { font-style: italic; }
  .md code.inline {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 4px; padding: 1px 5px; font-size: .92em; color: var(--accent);
  }
  .md pre.code {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 6px; padding: 10px 12px; margin: 0 0 8px;
    overflow-x: auto; white-space: pre;
  }
  .md pre.code code { color: var(--ink); font-size: .92em; }
  .md blockquote {
    border-left: 3px solid var(--accent-dim); margin: 0 0 8px;
    padding: 2px 0 2px 12px; color: var(--dim);
  }
  .file-list { color: var(--ink); }
  .file-list b { color: var(--user); font-weight: 600; }
  .thinking { color: var(--dim); font-style: italic; }

  footer {
    border-top: 1px solid var(--line);
    padding: 10px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13.5px;
    padding: 9px 12px;
    border-radius: 6px;
  }
  #input:focus { outline: none; border-color: var(--accent-dim); }
  #input::placeholder { color: var(--dim); }
  .hint { color: var(--dim); font-size: 11.5px; padding: 0 16px 8px; }

  /* write confirmation card */
  .confirm {
    border: 1px solid var(--accent-dim);
    border-radius: 6px;
    padding: 10px 12px;
    margin: 0 0 10px;
    background: var(--panel);
  }
  .confirm .title { color: var(--accent); margin-bottom: 6px; }
  .confirm .meta { color: var(--dim); font-size: 12px; margin-bottom: 8px; }
  .diff { white-space: pre; word-break: break-word; font-size: 12px; max-height: 300px; overflow: auto; border: 1px solid var(--line); border-radius: 4px; padding: 0; }
  .diff table { border-collapse: collapse; width: 100%; }
  .diff .ln { color: var(--dim); text-align: right; padding: 0 8px 0 6px; user-select: none; white-space: nowrap; vertical-align: top; border-right: 1px solid var(--line); }
  .diff .code { padding: 0 8px; white-space: pre-wrap; word-break: break-word; }
  .diff tr.add { background: rgba(126,231,135,.08); }
  .diff tr.add .code { color: var(--accent); }
  .diff tr.del { background: rgba(255,123,114,.08); }
  .diff tr.del .code { color: var(--err); text-decoration: line-through; opacity: .85; }
  .diff tr.ctx .code { color: var(--dim); }
  .diff tr.hunk td { color: var(--user); font-size: 11px; padding: 2px 8px; background: rgba(121,192,255,.06); }
  .confirm .actions { margin-top: 10px; display: flex; gap: 8px; }
  .confirm button {
    font-family: var(--mono); font-size: 12px; padding: 5px 12px;
    border-radius: 5px; cursor: pointer; border: 1px solid var(--line);
    background: transparent; color: var(--ink);
  }
  .confirm button.ok { border-color: var(--accent-dim); color: var(--accent); }
  .confirm button.no { border-color: var(--err); color: var(--err); }
  .confirm button:focus-visible { outline: 2px solid var(--user); outline-offset: 1px; }

  .plan-card { border: 1px solid var(--user); border-radius: 6px; padding: 10px 12px; margin: 0 0 10px; background: var(--panel); }
  .plan-card .plan-title { color: var(--user); margin-bottom: 6px; }
  .plan-card .plan-summary { margin-bottom: 8px; }
  .plan-card .plan-steps { margin: 0 0 8px; padding-left: 20px; }
  .plan-card .plan-steps li { margin-bottom: 3px; }
  .plan-card .plan-files { color: var(--dim); font-size: 12px; margin-bottom: 10px; }
  .plan-card .plan-actions { display: flex; gap: 8px; align-items: center; }
  .plan-card .plan-actions input {
    flex: 1; font-family: var(--mono); font-size: 12px; padding: 5px 8px;
    border: 1px solid var(--line); border-radius: 5px; background: var(--bg); color: var(--ink);
  }
  .plan-card .plan-actions input:focus { border-color: var(--user); outline: none; }

  /* drag overlay */
  #drop {
    position: fixed; inset: 0;
    background: rgba(13,17,23,.92);
    border: 2px dashed var(--accent-dim);
    display: none;
    align-items: center; justify-content: center;
    color: var(--accent); font-size: 18px;
    z-index: 50;
  }
  #drop.on { display: flex; }
  a { color: var(--user); }

  /* file drawer */
  #drawer {
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    max-height: 0;
    overflow: hidden;
    transition: max-height .25s ease;
  }
  #drawer.open { max-height: 260px; overflow-y: auto; }
  #drawer-list {
    padding: 8px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  #drawer-list:empty::after {
    content: "no files yet — drag some in or click + add files";
    color: var(--dim);
  }
  .file-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 4px 8px;
    font-size: 12px;
    color: var(--ink);
  }
  .file-chip .name { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-chip .size { color: var(--dim); font-size: 11px; }
  .file-chip button {
    background: transparent;
    border: none;
    color: var(--user);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    padding: 0 2px;
  }
  .file-chip button:hover { color: var(--accent); }
  .file-chip .rm { color: var(--err); }
  .file-chip .rm:hover { color: var(--warn); }
</style>
</head>
<body>
  <header>
    <span class="brand">filechat</span>
    <button id="fileStat" style="cursor:pointer">0 files ▸</button>
    <span class="grow"></span>
    <button id="compressBtn">compress</button>
    <button id="addBtn">+ add files</button>
    <button id="planBtn" title="plan mode: agent proposes changes before editing (shift+tab to cycle)">plan: auto</button>
    <button id="autoBtn" title="when on, agent edits apply without asking">confirm edits: on</button>
    <button id="logBtn">↓ log</button>
    <button id="tokenBtn">set token</button>
    <button id="wipeBtn">clear all</button>
    <input type="file" id="picker" multiple hidden>
  </header>

  <div id="drawer"><div id="drawer-list"></div></div>

  <div id="log" aria-live="polite"></div>

  <div class="hint">commands: <b>ls</b> · <b>cat &lt;file&gt;</b> · <b>search &lt;term&gt;</b> · <b>rm &lt;file&gt;</b> · <b>help</b> — or ask a question, or ask the agent to edit a file</div>

  <footer>
    <input id="input" autocomplete="off" placeholder="ask a question, or type a command…" autofocus>
  </footer>

  <div id="drop">drop files to add them</div>

<script>
/* ---------- config ---------- */
// Anthropic API base. Point this at your proxy (which can hold the real key
// server-side) or directly at https://api.anthropic.com for bring-your-own-key.
const API_BASE = "https://vibe-proxy.westeurope.dev.maersk.io";
const API_URL = API_BASE.replace(/\/$/, "") + "/v1/messages";

/* ---------- tiny IndexedDB wrapper (stores path -> text) ---------- */
const DB = (() => {
  let dbp;
  function open() {
    if (dbp) return dbp;
    dbp = new Promise((res, rej) => {
      const r = indexedDB.open("filechat", 1);
      r.onupgradeneeded = () => r.result.createObjectStore("files");
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
    return dbp;
  }
  async function tx(mode, fn) {
    const db = await open();
    return new Promise((res, rej) => {
      const t = db.transaction("files", mode);
      const store = t.objectStore("files");
      const out = fn(store);
      t.oncomplete = () => res(out.result !== undefined ? out.result : null);
      t.onerror = () => rej(t.error);
    });
  }
  return {
    put: (k, v) => tx("readwrite", s => s.put(v, k)),
    get: (k) => tx("readonly", s => s.get(k)),
    del: (k) => tx("readwrite", s => s.delete(k)),
    keys: () => tx("readonly", s => s.getAllKeys()),
    clear: () => tx("readwrite", s => s.clear()),
  };
})();

/* ---------- token storage (localStorage, prompted once) ---------- */
function getToken(force) {
  let t = localStorage.getItem("apiToken");
  if (!t || force) {
    t = prompt("Enter your gateway bearer token (stored only in this browser):", t || "");
    if (t) localStorage.setItem("apiToken", t.trim());
  }
  return localStorage.getItem("apiToken");
}

/* ---------- log helpers ---------- */
const log = document.getElementById("log");
function print(text, cls="sys") {
  const d = document.createElement("div");
  d.className = "row " + cls;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}
function printHTML(html, cls="sys") {
  const d = document.createElement("div");
  d.className = "row " + cls;
  d.innerHTML = html;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}

/* ---------- file ingestion ---------- */
async function addFiles(fileList) {
  for (const f of fileList) {
    const lower = f.name.toLowerCase();
    if (!/\.(txt|md|markdown|csv|json|js|ts|py|html|css|log|xml|yaml|yml|tsv)$/.test(lower)) {
      print(`skipped ${f.name} — only text-based files can be read in the browser`, "warn");
      continue;
    }
    try {
      const text = await f.text();
      await DB.put(f.name, text);
      print(`added ${f.name} (${text.length.toLocaleString()} chars)`, "sys");
    } catch (e) {
      print(`failed to read ${f.name}: ${e.message}`, "err");
    }
  }
  await refreshStat();
}

async function refreshStat() {
  const keys = await DB.keys();
  const drawer = document.getElementById("drawer");
  const isOpen = drawer.classList.contains("open");
  const btn = document.getElementById("fileStat");
  btn.textContent = `${keys.length} file${keys.length === 1 ? "" : "s"} ${isOpen ? "▾" : "▸"}`;

  // rebuild drawer contents
  const list = document.getElementById("drawer-list");
  list.innerHTML = "";
  for (const k of keys) {
    const text = await DB.get(k);
    const chip = document.createElement("span");
    chip.className = "file-chip";
    chip.innerHTML =
      `<span class="name">${escapeHTML(k)}</span>`
      + `<span class="size">${formatSize(text.length)}</span>`
      + `<button class="dl" title="download">↓</button>`
      + `<button class="rm" title="remove">✕</button>`;
    chip.querySelector(".dl").onclick = () => downloadFile(k, text);
    chip.querySelector(".rm").onclick = async () => {
      await DB.del(k);
      print(`removed ${k}`, "sys");
      await refreshStat();
    };
    list.appendChild(chip);
  }
}

function formatSize(chars) {
  if (chars < 1000) return chars + " ch";
  if (chars < 1_000_000) return (chars / 1000).toFixed(1) + " k";
  return (chars / 1_000_000).toFixed(1) + " M";
}

function downloadFile(name, content) {
  const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* ---------- commands ---------- */
async function runCommand(raw) {
  const [cmd, ...rest] = raw.trim().split(/\s+/);
  const arg = rest.join(" ");
  const keys = await DB.keys();

  switch (cmd) {
    case "help":
      print(
`ls               list stored files
cat <file>       print a file's contents
search <term>    find a term across all files (case-insensitive)
rm <file>        remove a file
help             this message

Conversation is auto-saved to memory.md after each exchange.
Auto-compresses at 80% of 256k context, or click "compress" manually.

Anything that isn't a command is sent to the agent as a question,
with the contents of your files included as context.`, "sys");
      return;

    case "ls":
      if (!keys.length) { print("no files yet — drag some in or hit '+ add files'", "sys"); return; }
      printHTML(keys.map(k => `<b>${escapeHTML(k)}</b>`).join("\n"), "file-list");
      return;

    case "cat": {
      if (!arg) { print("usage: cat <file>", "warn"); return; }
      const v = await DB.get(arg);
      if (v == null) { print(`no such file: ${arg}`, "err"); return; }
      print(v, "ai");
      return;
    }

    case "rm": {
      if (!arg) { print("usage: rm <file>", "warn"); return; }
      const v = await DB.get(arg);
      if (v == null) { print(`no such file: ${arg}`, "err"); return; }
      await DB.del(arg);
      print(`removed ${arg}`, "sys");
      await refreshStat();
      return;
    }

    case "search": {
      if (!arg) { print("usage: search <term>", "warn"); return; }
      const term = arg.toLowerCase();
      let hits = 0;
      for (const k of keys) {
        const text = await DB.get(k);
        const lines = text.split("\n");
        lines.forEach((line, i) => {
          if (line.toLowerCase().includes(term)) {
            hits++;
            printHTML(`<b>${escapeHTML(k)}</b>:${i + 1}  ${highlight(line, arg)}`, "file-list");
          }
        });
      }
      if (!hits) print(`no matches for "${arg}"`, "sys");
      return;
    }

    default:
      // not a command → treat as a question for Claude
      await askClaude(raw);
  }
}

function escapeHTML(s){return (s ?? "").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

/* ---------- minimal, dependency-free markdown renderer ----------
   Escapes HTML first (safe against echoed file content), then applies
   block and inline rules. Covers what Claude typically emits. */
function renderMarkdown(src) {
  // 1. pull out fenced code blocks so their contents aren't further processed
  const blocks = [];
  src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const i = blocks.length;
    blocks.push(`<pre class="code"><code>${escapeHTML(code.replace(/\n$/, ""))}</code></pre>`);
    return `\u0000BLOCK${i}\u0000`;
  });

  // 2. escape everything else
  src = escapeHTML(src);

  // 3. inline spans (operate on escaped text)
  const inline = (t) => t
    .replace(/`([^`]+)`/g, '<code class="inline">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
    .replace(/\b_([^_]+)_\b/g, "<em>$1</em>")
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,
             '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

  // 4. block-level pass, line by line
  const lines = src.split("\n");
  let html = "", listType = null;
  const closeList = () => { if (listType) { html += `</${listType}>`; listType = null; } };

  for (let raw of lines) {
    const line = raw;
    let m;
    if (/^\u0000BLOCK\d+\u0000$/.test(line.trim())) { closeList(); html += line.trim(); continue; }
    if ((m = line.match(/^(#{1,6})\s+(.*)$/))) {
      closeList(); const lvl = m[1].length;
      html += `<h${lvl} class="md-h">${inline(m[2])}</h${lvl}>`; continue;
    }
    if ((m = line.match(/^\s*[-*+]\s+(.*)$/))) {
      if (listType !== "ul") { closeList(); html += '<ul class="md-list">'; listType = "ul"; }
      html += `<li>${inline(m[1])}</li>`; continue;
    }
    if ((m = line.match(/^\s*\d+\.\s+(.*)$/))) {
      if (listType !== "ol") { closeList(); html += '<ol class="md-list">'; listType = "ol"; }
      html += `<li>${inline(m[1])}</li>`; continue;
    }
    if ((m = line.match(/^\s*&gt;\s?(.*)$/))) {
      closeList(); html += `<blockquote>${inline(m[1])}</blockquote>`; continue;
    }
    if (line.trim() === "") { closeList(); continue; }
    closeList();
    html += `<p class="md-p">${inline(line)}</p>`;
  }
  closeList();

  // 5. restore code blocks
  html = html.replace(/\u0000BLOCK(\d+)\u0000/g, (_, i) => blocks[+i]);
  return html;
}

function printMarkdown(text) {
  const d = document.createElement("div");
  d.className = "row ai md";
  d.innerHTML = renderMarkdown(text);
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}

function highlight(line, term){
  const e = escapeHTML(line);
  const re = new RegExp("("+term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");
  return e.replace(re,'<span style="color:var(--accent)">$1</span>');
}

/* ---------- tool definitions sent to the API ---------- */
const TOOLS = [
  {
    name: "write_file",
    description: "Create a new file or completely overwrite an existing one in the user's browser file store. Use for new files or full rewrites.",
    input_schema: {
      type: "object",
      properties: {
        path: { type: "string", description: "File name / path, e.g. notes.md" },
        content: { type: "string", description: "The full new contents of the file" }
      },
      required: ["path", "content"]
    }
  },
  {
    name: "str_replace",
    description: "Make a targeted edit to an existing file by replacing an exact substring. old_str must appear exactly once in the file. Prefer this over write_file for small changes.",
    input_schema: {
      type: "object",
      properties: {
        path: { type: "string", description: "File name / path of an existing file" },
        old_str: { type: "string", description: "Exact text to replace (must occur exactly once)" },
        new_str: { type: "string", description: "Replacement text" }
      },
      required: ["path", "old_str", "new_str"]
    }
  },
  {
    name: "list_files",
    description: "List all files in the user's store with their sizes and line counts. Use this first to orient yourself — like running ls.",
    input_schema: { type: "object", properties: {} }
  },
  {
    name: "read_file",
    description: "Read a file's contents (or a range of lines). Returns line-numbered text. Use a small range to stay focused — read only what you need.",
    input_schema: {
      type: "object",
      properties: {
        path:   { type: "string", description: "File name / path" },
        offset: { type: "integer", description: "1-based starting line (default 1)" },
        limit:  { type: "integer", description: "Max lines to return (default 200, max 2000)" }
      },
      required: ["path"]
    }
  },
  {
    name: "grep_files",
    description: "Search file contents for a pattern (string or regex). Returns matching lines with context, grouped by file. Use this to find relevant sections before reading.",
    input_schema: {
      type: "object",
      properties: {
        pattern:       { type: "string", description: "Search term or regex pattern" },
        path:          { type: "string", description: "Restrict search to a single file (optional — omit to search all files)" },
        context_lines: { type: "integer", description: "Lines of context around each match (default 2, max 5)" }
      },
      required: ["pattern"]
    }
  },
  {
    name: "head_file",
    description: "Read the first N lines of a file. Quick way to see a file's structure before diving deeper.",
    input_schema: {
      type: "object",
      properties: {
        path:  { type: "string", description: "File name / path" },
        lines: { type: "integer", description: "Number of lines from the top (default 50)" }
      },
      required: ["path"]
    }
  },
  {
    name: "propose_plan",
    description: "Present a plan to the user before making changes. Call this BEFORE any write_file or str_replace when the task involves editing files. Describe what you found and what you intend to change. The user will approve or request revisions.",
    input_schema: {
      type: "object",
      properties: {
        summary: { type: "string", description: "Brief summary of what you plan to do" },
        steps: { type: "array", items: { type: "string" }, description: "Ordered list of specific changes" },
        files_affected: { type: "array", items: { type: "string" }, description: "File names that will be created or modified" }
      },
      required: ["summary", "steps"]
    }
  }
];

/* compute the new full content a tool call would produce, without writing */
async function previewTool(name, input) {
  if (name === "write_file") {
    const before = await DB.get(input.path);
    return { path: input.path, before: before ?? null, after: input.content };
  }
  if (name === "str_replace") {
    const before = await DB.get(input.path);
    if (before == null) return { error: `no such file: ${input.path}` };
    const parts = before.split(input.old_str);
    if (parts.length === 1) return { error: `old_str not found in ${input.path}` };
    if (parts.length > 2) return { error: `old_str is not unique in ${input.path} (${parts.length - 1} matches)` };
    return { path: input.path, before, after: before.replace(input.old_str, input.new_str) };
  }
  return { error: `unknown tool: ${name}` };
}

/* contextual diff with line numbers — shows only changed hunks + context */
function renderDiff(before, after) {
  const CTX = 3;
  const a = (before ?? "").split("\n");
  const b = after.split("\n");

  // for new files, just show all lines as additions
  if (before == null) {
    let html = "<table>";
    b.forEach((line, i) => {
      html += `<tr class="add"><td class="ln"></td><td class="ln">${i + 1}</td><td class="code">+ ${escapeHTML(line)}</td></tr>`;
    });
    return html + "</table>";
  }

  const ops = computeDiff(a, b);
  const hunks = buildHunks(ops, a, b, CTX);

  let html = "<table>";
  for (const hunk of hunks) {
    html += `<tr class="hunk"><td colspan="3">@@ -${hunk.aStart + 1},${hunk.aCount} +${hunk.bStart + 1},${hunk.bCount} @@</td></tr>`;
    for (const ln of hunk.lines) {
      const lnA = ln.lnA != null ? ln.lnA + 1 : "";
      const lnB = ln.lnB != null ? ln.lnB + 1 : "";
      const prefix = ln.type === "add" ? "+" : ln.type === "del" ? "-" : " ";
      html += `<tr class="${ln.type}"><td class="ln">${lnA}</td><td class="ln">${lnB}</td><td class="code">${prefix} ${escapeHTML(ln.text)}</td></tr>`;
    }
  }
  if (!hunks.length) html += `<tr class="ctx"><td class="ln" colspan="3"> (no changes)</td></tr>`;
  return html + "</table>";
}

/* Myers O(ND) diff → [{type:"eq"|"del"|"add", aIdx?, bIdx?}] */
function computeDiff(a, b) {
  const n = a.length, m = b.length;
  if (n + m > 10000) return fallbackDiff(a, b);

  const max = n + m;
  const size = 2 * max + 1;
  const v = new Int32Array(size).fill(-1);
  const trace = [];
  v[max + 1] = 0;

  for (let d = 0; d <= max; d++) {
    trace.push(v.slice());
    for (let k = -d; k <= d; k += 2) {
      let x = (k === -d || (k !== d && v[max + k - 1] < v[max + k + 1]))
        ? v[max + k + 1] : v[max + k - 1] + 1;
      let y = x - k;
      while (x < n && y < m && a[x] === b[y]) { x++; y++; }
      v[max + k] = x;
      if (x >= n && y >= m) return traceBack(trace, max, n, m);
    }
  }
  return fallbackDiff(a, b);
}

function traceBack(trace, max, n, m) {
  const ops = [];
  let x = n, y = m;
  for (let d = trace.length - 1; d > 0; d--) {
    const v = trace[d - 1];
    const k = x - y;
    const prevK = (k === -d || (k !== d && v[max + k - 1] < v[max + k + 1])) ? k + 1 : k - 1;
    const prevX = v[max + prevK], prevY = prevX - prevK;
    while (x > prevX && y > prevY) { x--; y--; ops.push({ type: "eq", aIdx: x, bIdx: y }); }
    if (x === prevX) { y--; ops.push({ type: "add", bIdx: y }); }
    else { x--; ops.push({ type: "del", aIdx: x }); }
  }
  while (x > 0 && y > 0) { x--; y--; ops.push({ type: "eq", aIdx: x, bIdx: y }); }
  ops.reverse();
  return ops;
}

function fallbackDiff(a, b) {
  const ops = [];
  const max = Math.max(a.length, b.length);
  for (let i = 0; i < max; i++) {
    if (i < a.length && i < b.length && a[i] === b[i]) ops.push({ type: "eq", aIdx: i, bIdx: i });
    else {
      if (i < a.length) ops.push({ type: "del", aIdx: i });
      if (i < b.length) ops.push({ type: "add", bIdx: i });
    }
  }
  return ops;
}

function buildHunks(ops, a, b, ctx) {
  const changeIdx = [];
  ops.forEach((op, i) => { if (op.type !== "eq") changeIdx.push(i); });
  if (!changeIdx.length) return [];

  // merge nearby changes into ranges
  const ranges = [[changeIdx[0], changeIdx[0]]];
  for (let i = 1; i < changeIdx.length; i++) {
    if (changeIdx[i] - ranges[ranges.length - 1][1] <= ctx * 2 + 1)
      ranges[ranges.length - 1][1] = changeIdx[i];
    else ranges.push([changeIdx[i], changeIdx[i]]);
  }

  return ranges.map(([s, e]) => {
    const from = Math.max(0, s - ctx);
    const to = Math.min(ops.length - 1, e + ctx);
    const lines = [];
    let aStart = Infinity, bStart = Infinity, aCount = 0, bCount = 0;
    for (let i = from; i <= to; i++) {
      const op = ops[i];
      if (op.type === "eq") {
        if (op.aIdx < aStart) aStart = op.aIdx;
        if (op.bIdx < bStart) bStart = op.bIdx;
        aCount++; bCount++;
        lines.push({ type: "ctx", lnA: op.aIdx, lnB: op.bIdx, text: a[op.aIdx] ?? "" });
      } else if (op.type === "del") {
        if (op.aIdx < aStart) aStart = op.aIdx;
        aCount++;
        lines.push({ type: "del", lnA: op.aIdx, lnB: null, text: a[op.aIdx] ?? "" });
      } else {
        if (op.bIdx < bStart) bStart = op.bIdx;
        bCount++;
        lines.push({ type: "add", lnA: null, lnB: op.bIdx, text: b[op.bIdx] ?? "" });
      }
    }
    if (aStart === Infinity) aStart = 0;
    if (bStart === Infinity) bStart = 0;
    return { aStart, bStart, aCount, bCount, lines };
  });
}

/* show a confirmation card; resolves true/false */
function confirmWrite(name, prev) {
  return new Promise(resolve => {
    const card = document.createElement("div");
    card.className = "row confirm";
    const verb = prev.before == null ? "create" : "edit";
    card.innerHTML =
      `<div class="title">Agent wants to ${verb}: ${escapeHTML(prev.path)}</div>`
      + `<div class="meta">${name} · ${prev.before == null ? "new file" : prev.before.length + " → " + prev.after.length + " chars"}</div>`
      + `<div class="diff">${(() => { try { return renderDiff(prev.before, prev.after); } catch(e) { return `<tr><td class="code">diff error: ${escapeHTML(e.message)}</td></tr>`; } })()}</div>`
      + `<div class="actions"><button class="ok">apply</button><button class="no">reject</button></div>`;
    log.appendChild(card);
    log.scrollTop = log.scrollHeight;
    card.querySelector(".ok").onclick = () => { card.querySelector(".actions").innerHTML = '<span class="sys">applied</span>'; resolve(true); };
    card.querySelector(".no").onclick = () => { card.querySelector(".actions").innerHTML = '<span class="warn">rejected</span>'; resolve(false); };
    card.querySelector(".ok").focus();
  });
}

function confirmPlan(input) {
  return new Promise(resolve => {
    const card = document.createElement("div");
    card.className = "row plan-card";
    const stepsHtml = (input.steps || []).map(s => `<li>${escapeHTML(s)}</li>`).join("");
    const filesHtml = input.files_affected?.length
      ? `<div class="plan-files">Files: ${input.files_affected.map(f => `<b>${escapeHTML(f)}</b>`).join(", ")}</div>`
      : "";
    card.innerHTML =
      `<div class="plan-title">Proposed Plan</div>`
      + `<div class="plan-summary">${escapeHTML(input.summary)}</div>`
      + `<ol class="plan-steps">${stepsHtml}</ol>`
      + filesHtml
      + `<div class="plan-actions">`
      +   `<button class="ok">approve</button>`
      +   `<input class="revise-input" placeholder="type feedback to revise…">`
      +   `<button class="no">reject</button>`
      + `</div>`;
    log.appendChild(card);
    log.scrollTop = log.scrollHeight;

    const okBtn = card.querySelector(".ok");
    const noBtn = card.querySelector(".no");
    const reviseInput = card.querySelector(".revise-input");

    okBtn.onclick = () => {
      card.querySelector(".plan-actions").innerHTML = '<span class="sys">approved</span>';
      resolve("Plan approved. Execute the changes now.");
    };
    noBtn.onclick = () => {
      card.querySelector(".plan-actions").innerHTML = '<span class="warn">rejected</span>';
      resolve("The user rejected this plan. Do not proceed with any edits.");
    };
    reviseInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter" || !reviseInput.value.trim()) return;
      const feedback = reviseInput.value.trim();
      card.querySelector(".plan-actions").innerHTML = `<span class="sys">revision requested: ${escapeHTML(feedback)}</span>`;
      resolve(`The user wants you to revise the plan. Their feedback: ${feedback}`);
    });

    okBtn.focus();
  });
}

/* execute a tool call: preview, confirm (unless auto), write. returns a tool_result string */
async function executeTool(name, input) {
  try {

  /* ---- read-only tools (no confirmation needed) ---- */

  if (name === "list_files") {
    const keys = await DB.keys();
    const listing = [];
    for (const k of keys) {
      if (k === MEMORY_FILE) continue;
      const text = await DB.get(k);
      const lines = text.split("\n").length;
      listing.push({ name: k, size_chars: text.length, lines });
    }
    printHTML(`<span class="sys">list_files → ${listing.length} file(s)</span>`, "sys");
    return JSON.stringify(listing, null, 2);
  }

  if (name === "read_file") {
    const text = await DB.get(input.path);
    if (text == null) return `Error: no such file: ${input.path}`;
    const allLines = text.split("\n");
    const offset = Math.max(1, input.offset || 1);
    const limit = Math.min(input.limit || 200, 2000);
    const start = offset - 1;
    const slice = allLines.slice(start, start + limit);
    const numbered = slice.map((l, i) => `${String(start + i + 1).padStart(5)} | ${l}`).join("\n");
    const total = allLines.length;
    const end = Math.min(offset + slice.length - 1, total);
    const trailer = `(lines ${offset}-${end} of ${total})`;
    printHTML(`<span class="sys">read_file → <b>${escapeHTML(input.path)}</b> ${trailer}</span>`, "sys");
    return numbered + "\n\n" + trailer;
  }

  if (name === "head_file") {
    const text = await DB.get(input.path);
    if (text == null) return `Error: no such file: ${input.path}`;
    const n = Math.min(input.lines || 50, 500);
    const allLines = text.split("\n");
    const slice = allLines.slice(0, n);
    const numbered = slice.map((l, i) => `${String(i + 1).padStart(5)} | ${l}`).join("\n");
    const total = allLines.length;
    const trailer = `(first ${slice.length} of ${total} lines)`;
    printHTML(`<span class="sys">head_file → <b>${escapeHTML(input.path)}</b> ${trailer}</span>`, "sys");
    return numbered + "\n\n" + trailer;
  }

  if (name === "grep_files") {
    let re;
    try { re = new RegExp(input.pattern, "ig"); }
    catch (e) { return `Error: invalid pattern: ${e.message}`; }
    const ctx = Math.min(input.context_lines ?? 2, 5);
    const targetKeys = input.path
      ? [input.path]
      : (await DB.keys()).filter(k => k !== MEMORY_FILE);
    const output = [];
    let matchCount = 0;
    const MAX_MATCHES = 50;
    for (const k of targetKeys) {
      const text = await DB.get(k);
      if (!text) continue;
      const lines = text.split("\n");
      for (let i = 0; i < lines.length && matchCount < MAX_MATCHES; i++) {
        if (re.test(lines[i])) {
          re.lastIndex = 0;
          matchCount++;
          const from = Math.max(0, i - ctx);
          const to = Math.min(lines.length - 1, i + ctx);
          for (let j = from; j <= to; j++) {
            const marker = j === i ? ">" : " ";
            output.push(`${k}:${j + 1}:${marker} ${lines[j]}`);
          }
          output.push("---");
        }
      }
    }
    const fileCount = targetKeys.length;
    printHTML(`<span class="sys">grep_files → "${escapeHTML(input.pattern)}" across ${fileCount} file(s) → ${matchCount} match(es)</span>`, "sys");
    if (!matchCount) return `No matches found for "${input.pattern}"`;
    let result = output.join("\n");
    if (matchCount >= MAX_MATCHES) result += `\n\n(showing first ${MAX_MATCHES} matches, more may exist)`;
    return result;
  }

  if (name === "propose_plan") {
    const result = await confirmPlan(input);
    if (result.startsWith("Plan approved")) planApproved = true;
    return result;
  }

  /* ---- write tools (need preview + confirmation) ---- */

  // hard gate: in plan mode "on", block writes until a plan is approved
  if (planMode === "on" && !planApproved && (name === "write_file" || name === "str_replace")) {
    return "Error: Plan mode is active. You must call propose_plan and get approval before making edits.";
  }

  const prev = await previewTool(name, input);
  if (prev.error) return `Error: ${prev.error}`;

  let approved = autoWrite;
  if (!autoWrite) approved = await confirmWrite(name, prev);
  else printHTML(`<span class="sys">auto-applied ${name} → <b>${escapeHTML(prev.path)}</b></span>`, "file-list");

  if (!approved) return `The user rejected this edit to ${prev.path}. Do not retry it.`;

  await DB.put(prev.path, prev.after);
  await refreshStat();
  return `Success: ${prev.path} now has ${prev.after.length} characters.`;
  } catch (e) {
    print(`tool execution error: ${e.message}`, "err");
    return `Error executing ${name}: ${e.message}`;
  }
}

/* ---------- conversation memory ---------- */
const MEMORY_FILE = "memory.md";
const conversation = []; // persistent conversation history
const CONTEXT_LIMIT = 256_000;     // model context window in tokens
const COMPRESS_AT = Math.floor(CONTEXT_LIMIT * 0.8); // 204,800 tokens
let lastInputTokens = 0;           // updated after each API call
const debugLog = [];                // raw API request/response log

/* serialize conversation to a readable markdown log */
function conversationToMarkdown() {
  const lines = ["# Conversation Memory\n"];
  for (const msg of conversation) {
    if (msg.role === "user") {
      if (typeof msg.content === "string") {
        lines.push(`## You\n${msg.content}\n`);
      }
      // skip tool_result turns in the log
    } else if (msg.role === "assistant") {
      const parts = Array.isArray(msg.content) ? msg.content : [msg.content];
      const text = parts.filter(b => b.type === "text").map(b => b.text).join("\n").trim();
      const tools = parts.filter(b => b.type === "tool_use");
      if (text) lines.push(`## Agent\n${text}\n`);
      for (const t of tools) {
        lines.push(`> *tool: ${t.name}* — ${t.input.path || ""}\n`);
      }
    }
  }
  return lines.join("\n");
}

/* save current conversation to memory.md after each exchange */
async function saveConversation() {
  if (!conversation.length) return;
  await DB.put(MEMORY_FILE, conversationToMarkdown());
  await refreshStat();
}

/* compress: summarize conversation via Claude, save to memory.md, reset */
async function compressConversation() {
  const token = getToken();
  if (!token || !conversation.length) return;

  // save full log first
  await saveConversation();

  const thinking = print("compressing conversation…", "thinking");
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 800,
        system: "Summarize the conversation so far into a concise recap (under 500 words). "
          + "Cover: what files were discussed, what was changed, key decisions, and any open questions. "
          + "Write in markdown. This summary will seed the next conversation so Claude has context.",
        messages: [...conversation, {
          role: "user",
          content: "Please summarize our conversation so far."
        }]
      })
    });
    const data = await res.json();
    thinking.remove();
    if (!res.ok) {
      print(`compress failed: ${data.error?.message || "unknown error"}`, "err");
      return;
    }
    const summary = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
    if (summary) await DB.put(MEMORY_FILE, summary);
  } catch (e) {
    thinking.remove();
    print(`compress failed: ${e.message}`, "err");
    return;
  }

  conversation.length = 0;
  lastInputTokens = 0;
  log.innerHTML = "";
  print("conversation compressed — context freed", "sys");

  // show the summary that will seed the next conversation
  const memory = await DB.get(MEMORY_FILE);
  if (memory) printMarkdown(memory);

  await refreshStat();
}

/* ---------- Claude call (agentic tool-use loop) ---------- */
async function buildSystem() {
  const INLINE_THRESHOLD = 12_000; // inline small stores (chars) to avoid unnecessary tool calls
  const keys = await DB.keys();

  // build file inventory (name, size, line count)
  const files = [];
  let totalChars = 0;
  for (const k of keys) {
    if (k === MEMORY_FILE) continue;
    const text = await DB.get(k);
    const lines = text.split("\n").length;
    files.push({ name: k, text, size: text.length, lines });
    totalChars += text.length;
  }

  // for small stores, inline file contents directly (no tool overhead)
  const useInline = totalChars > 0 && totalChars <= INLINE_THRESHOLD;

  let sys;
  if (useInline) {
    sys = "You are a helpful assistant working with the user's files in a browser-based store. "
      + "Answer questions from the file contents, and cite file names when relevant. "
      + "When the user asks you to change a file, use the write_file or str_replace tools immediately — "
      + "do NOT just describe what you would change; call the tool right away. "
      + "Prefer str_replace for small targeted edits. After editing, briefly say what you changed. "
      + "Edits are applied to the user's local browser storage only.";
  } else {
    sys = "You are a helpful assistant working with the user's files in a browser-based store. "
      + "File contents are NOT pre-loaded — treat the file store as external memory and query it on demand.\n\n"
      + "Workflow:\n"
      + "1. Use list_files to see what's available (like ls).\n"
      + "2. Use grep_files to find relevant sections — search first, read second.\n"
      + "3. Use read_file or head_file to read specific line ranges — only what you need.\n"
      + "4. To edit: grep/read to locate the target, then str_replace for surgical edits or write_file for full rewrites.\n\n"
      + "Keep your working context lean — read only what's relevant to the question. "
      + "Cite file names and line numbers when discussing content. "
      + "Edits are applied to the user's local browser storage only.";
  }

  // plan mode instructions
  if (planMode === "on") {
    sys += "\n\nIMPORTANT — PLAN MODE IS ACTIVE. Before making ANY edits, you MUST:\n"
      + "1. Investigate using read-only tools (list_files, read_file, grep_files, head_file).\n"
      + "2. Call propose_plan with your summary, steps, and affected files.\n"
      + "3. Wait for the user to approve before calling write_file or str_replace.\n"
      + "Do NOT skip the propose_plan step. Do NOT call write tools before your plan is approved.";
  } else if (planMode === "auto") {
    sys += "\n\nWhen the user's request involves creating or editing files, call propose_plan first "
      + "to present your approach before making changes. For simple questions about file contents, "
      + "answer directly without a plan.";
  }
  // planMode === "off" — no plan instructions, direct action

  // inject prior conversation summary if available
  const memory = await DB.get(MEMORY_FILE);
  if (memory && !conversation.length) {
    sys += "\n\n--- PRIOR CONVERSATION SUMMARY ---\n" + memory
      + "\n--- END SUMMARY (the full log is stored in memory.md) ---";
  }

  if (useInline) {
    // small store: inline all file contents
    let context = "";
    for (const f of files) context += `\n\n===== FILE: ${f.name} =====\n${f.text}`;
    sys += "\n\nThe user's current files:" + context;
  } else if (files.length) {
    // large store: just show the listing
    let listing = "\n\nFiles in store (use read_file / grep_files to access contents):";
    for (const f of files) listing += `\n- ${f.name} (${f.size.toLocaleString()} chars, ${f.lines.toLocaleString()} lines)`;
    sys += listing;
  } else {
    sys += "\n\n(No files loaded.)";
  }

  return sys;
}

/* trim conversation so it never ends with an orphaned tool_use (no tool_result after it) */
function trimDanglingToolUse() {
  while (conversation.length) {
    const last = conversation[conversation.length - 1];
    // if last message is assistant with tool_use blocks, remove it (no result followed)
    if (last.role === "assistant") {
      const blocks = Array.isArray(last.content) ? last.content : [last.content];
      if (blocks.some(b => b.type === "tool_use")) { conversation.pop(); continue; }
    }
    // if last message is a user tool_result array that's now orphaned, remove it too
    if (last.role === "user" && Array.isArray(last.content) && last.content[0]?.type === "tool_result") {
      conversation.pop(); continue;
    }
    break;
  }
}

async function askClaude(question) {
  const token = getToken();
  if (!token) { print("no gateway token set — click 'set token'", "err"); return; }

  planApproved = false; // reset plan gate for each new exchange
  const system = await buildSystem();

  // clean up any broken state from a previous failed exchange
  trimDanglingToolUse();

  // append user message to persistent history
  conversation.push({ role: "user", content: question });

  const MAX_TURNS = 15;
  for (let turn = 0; turn < MAX_TURNS; turn++) {
    const thinking = print(turn === 0 ? "thinking…" : "working…", "thinking");
    let data;
    try {
      const headers = {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      };
      const reqBody = {
        model: "claude-sonnet-4-6",
        max_tokens: 8192,
        system,
        tools: TOOLS,
        messages: conversation
      };
      // snapshot messages for debug log (conversation is mutated later)
      const entry = { ts: new Date().toISOString(), turn, request: { ...reqBody, messages: JSON.parse(JSON.stringify(conversation)) }, response: null, error: null };
      debugLog.push(entry);

      const res = await fetch(API_URL, {
        method: "POST",
        headers,
        body: JSON.stringify(reqBody)
      });
      data = await res.json();
      entry.response = { status: res.status, body: data };
      thinking.remove();
      if (!res.ok) {
        print(`API error ${res.status}: ${data.error?.message || JSON.stringify(data)}`, "err");
        if (res.status === 401) print("token rejected — click 'set token' to re-enter", "warn");
        trimDanglingToolUse();
        return;
      }
    } catch (e) {
      thinking.remove();
      debugLog[debugLog.length - 1].error = e.message;
      print(`request failed: ${e.message}`, "err");
      trimDanglingToolUse();
      return;
    }

    // print any text the model produced this turn
    const textOut = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
    if (textOut) printMarkdown(textOut);

    // record the assistant turn verbatim (needed for the tool loop)
    conversation.push({ role: "assistant", content: data.content });

    // track token usage
    if (data.usage) lastInputTokens = data.usage.input_tokens || 0;

    const toolCalls = (data.content || []).filter(b => b.type === "tool_use");
    if (data.stop_reason !== "tool_use" || !toolCalls.length) {
      await saveConversation();
      // auto-compress if approaching context limit
      if (lastInputTokens >= COMPRESS_AT) {
        print(`context at ${Math.round(lastInputTokens / CONTEXT_LIMIT * 100)}% — auto-compressing…`, "warn");
        await compressConversation();
      }
      return; // done
    }

    // execute each tool call and gather results
    const results = [];
    for (const call of toolCalls) {
      const result = await executeTool(call.name, call.input);
      results.push({ type: "tool_result", tool_use_id: call.id, content: result });
      debugLog.push({ ts: new Date().toISOString(), tool: call.name, input: call.input, result });
    }
    conversation.push({ role: "user", content: results });
    // loop continues so Claude can respond to the results
  }
  print("stopped after several tool steps — ask again to continue", "warn");
}

/* ---------- plan mode ---------- */
let planMode = "auto"; // "auto" | "on" | "off"
let planApproved = false;

function cyclePlanMode() {
  planMode = planMode === "auto" ? "on" : planMode === "on" ? "off" : "auto";
  document.getElementById("planBtn").textContent = `plan: ${planMode}`;
  print(`plan mode: ${planMode}`, "warn");
}

/* ---------- wiring ---------- */
const input = document.getElementById("input");
input.addEventListener("keydown", async (e) => {
  if (e.key === "Tab" && e.shiftKey) {
    e.preventDefault();
    cyclePlanMode();
    return;
  }
  if (e.key !== "Enter" || !input.value.trim()) return;
  const v = input.value;
  input.value = "";
  print(v, "you");
  await runCommand(v);
});

document.getElementById("compressBtn").onclick = async () => {
  if (!conversation.length) { print("nothing to compress yet", "sys"); return; }
  await compressConversation();
};
document.getElementById("fileStat").onclick = async () => {
  const drawer = document.getElementById("drawer");
  drawer.classList.toggle("open");
  await refreshStat();
};
document.getElementById("addBtn").onclick = () => document.getElementById("picker").click();
document.getElementById("picker").onchange = (e) => addFiles(e.target.files);
document.getElementById("planBtn").onclick = cyclePlanMode;

let autoWrite = false;
document.getElementById("autoBtn").onclick = (e) => {
  autoWrite = !autoWrite;
  e.target.textContent = autoWrite ? "confirm edits: off" : "confirm edits: on";
  print(autoWrite
    ? "edits will now apply automatically without asking"
    : "edits will ask for confirmation before applying", "warn");
};
document.getElementById("tokenBtn").onclick = () => {
  getToken(true);
  print(localStorage.getItem("apiToken") ? "token saved in this browser" : "no token set", "sys");
};
document.getElementById("logBtn").onclick = () => {
  if (!debugLog.length) { print("no API calls logged yet", "sys"); return; }
  const text = JSON.stringify(debugLog, null, 2);
  downloadFile("filechat-debug.json", text);
  print(`downloaded debug log (${debugLog.length} entries)`, "sys");
};
document.getElementById("wipeBtn").onclick = async () => {
  if (!confirm("Clear all stored files AND the API token from this browser?")) return;
  await DB.clear();
  localStorage.removeItem("apiToken");
  conversation.length = 0;
  debugLog.length = 0;
  log.innerHTML = "";
  await refreshStat();
  print("cleared all files, token, and conversation history", "sys");
};

/* drag & drop */
const drop = document.getElementById("drop");
let dragDepth = 0;
window.addEventListener("dragenter", e => { e.preventDefault(); dragDepth++; drop.classList.add("on"); });
window.addEventListener("dragover", e => e.preventDefault());
window.addEventListener("dragleave", e => { dragDepth--; if (dragDepth <= 0) drop.classList.remove("on"); });
window.addEventListener("drop", e => {
  e.preventDefault(); dragDepth = 0; drop.classList.remove("on");
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});

/* boot */
(async function boot() {
  print("filechat — a browser-local file assistant", "sys");
  print(`API endpoint: ${API_BASE}`, "sys");
  print("your files live only in this browser (IndexedDB). click 'set token' to enter your gateway bearer token, kept only in this browser.", "sys");
  print("type 'help' for commands, or add files and ask away.", "sys");
  await refreshStat();
  const keys = await DB.keys();
  if (keys.length) print(`restored ${keys.length} file(s) from last session`, "sys");
  const memory = await DB.get(MEMORY_FILE);
  if (memory) print("loaded prior summary from memory.md — agent has context from last session", "sys");
})();
</script>
